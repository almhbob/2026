name: Test RemoteAssist Server

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'RemoteAssist/server/**'
      - '.github/workflows/test-remoteassist-server.yml'
  push:
    branches:
      - main
    paths:
      - 'RemoteAssist/server/**'
      - '.github/workflows/test-remoteassist-server.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: RemoteAssist/server
        run: npm ci

      - name: Run tests
        working-directory: RemoteAssist/server
        run: npm test
