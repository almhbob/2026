name: Build Android AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: cd app && npm install

      - name: Expo Prebuild
        run: cd app && npx expo prebuild --platform android --clean

      - name: Build AAB
        run: cd app/android && ./gradlew bundleRelease

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/android/app/build/outputs/bundle/release/app-release.aab
