name: Build RemoteAssist APK

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'RemoteAssist/android/**'
      - '.github/workflows/build-remoteassist-apk.yml'
  push:
    branches:
      - main
    paths:
      - 'RemoteAssist/android/**'
      - '.github/workflows/build-remoteassist-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Unit tests
        working-directory: RemoteAssist/android
        run: gradle :app:testDebugUnitTest --no-daemon

      - name: Lint
        working-directory: RemoteAssist/android
        run: gradle :app:lintDebug --no-daemon

      - name: Build debug APK
        working-directory: RemoteAssist/android
        run: gradle :app:assembleDebug --no-daemon

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: RemoteAssist-lint-report
          path: RemoteAssist/android/app/build/reports/lint-results-debug.html

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RemoteAssist-debug-apk
          path: RemoteAssist/android/app/build/outputs/apk/debug/app-debug.apk

      # Only runs once RELEASE_KEYSTORE_BASE64 and friends are added as repository secrets
      # (see RemoteAssist/BUILD_APK.md). Until then these steps are skipped and only the
      # debug APK above is produced.
      - name: Check for release signing secret
        id: release_secret
        run: |
          if [ -n "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Decode release keystore
        if: steps.release_secret.outputs.present == 'true'
        run: echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > RemoteAssist/android/app/release.jks

      - name: Build signed release APK
        if: steps.release_secret.outputs.present == 'true'
        working-directory: RemoteAssist/android
        env:
          RELEASE_KEYSTORE_PATH: release.jks
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: gradle :app:assembleRelease --no-daemon

      - name: Upload signed release APK
        if: steps.release_secret.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: RemoteAssist-release-apk
          path: RemoteAssist/android/app/build/outputs/apk/release/app-release.apk
